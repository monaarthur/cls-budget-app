name: AWS Deploy React to S3

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/cls-budget-web/**"
      - ".github/workflows/AWS-DeployReactAppS3.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/cls-budget-web

    env:
      NEXT_OUTPUT: export
      NEXT_PUBLIC_AUTH_ENABLED: "true"
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate build configuration
        run: |
          if [ -z "$NEXT_PUBLIC_API_BASE_URL" ]; then
            echo "::error::Set GitHub secret NEXT_PUBLIC_API_BASE_URL to your Render API URL (e.g. https://cls-budget-api.onrender.com)."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/cls-budget-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare static export build
        run: |
          rm -f middleware.ts
          rm -rf app/api app/logo-actions

      - name: Build static site
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d out ]; then
            echo "::error::Expected static export folder 'out' was not created. Check next.config.ts and build logs."
            exit 1
          fi
          ls -la out | head -20

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::955598401326:role/github-actions-react-deploy-role
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync out/ s3://cls-budget-app-prod --delete

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          if [ -z "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Skipping CloudFront invalidation (CLOUDFRONT_DISTRIBUTION_ID not set)."
            exit 0
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
