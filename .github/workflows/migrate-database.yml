name: Migrate Supabase Database

on:
  push:
    branches: [main]
    paths:
      - "backend/src/CLS.Budget.Migration/**"
      - ".github/workflows/migrate-database.yml"
  workflow_dispatch:

env:
  DOTNET_VERSION: "9.0.x"

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Restore Migration project
        run: dotnet restore src/CLS.Budget.Migration/CLS.Budget.Migration.csproj

      - name: Validate connection string format
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: |
          if [ -z "$SUPABASE_CONNECTION_STRING" ]; then
            echo "::error::SUPABASE_CONNECTION_STRING secret is not set."
            exit 1
          fi
          if [[ "$SUPABASE_CONNECTION_STRING" == postgresql://* ]] || [[ "$SUPABASE_CONNECTION_STRING" == postgres://* ]]; then
            echo "::error::Use Npgsql key=value format (Host=...;Port=...), not postgresql:// URI. See docs/DEPLOYMENT.md"
            exit 1
          fi
          if [[ ! "$SUPABASE_CONNECTION_STRING" == Host=* ]]; then
            echo "::error::Connection string must start with Host=. Do not wrap the value in quotes when saving the secret."
            exit 1
          fi

      - name: Apply EF migrations
        env:
          SUPABASE_CONNECTION_STRING: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: dotnet ef database update --project src/CLS.Budget.Migration --startup-project src/CLS.Budget.Migration --connection "$SUPABASE_CONNECTION_STRING"
